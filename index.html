<script>
const firebaseConfig = {
  apiKey: "AIzaSyArP-V_vPSaIPz_ulWbP07rvPKDJSPVp1s",
  authDomain: "volea-beach-forever.firebaseapp.com",
  projectId: "volea-beach-forever",
  storageBucket: "volea-beach-forever.firebasestorage.app",
  messagingSenderId: "362602975964",
  appId: "1:362602975964:web:d5674876d2e68d8c6f9a19"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const DOC_REF = db.collection('volea').doc('lista-actual');

const MAX_PER_RED = 6;
const APP_URL = 'https://volea-beach-forever.web.app';

function urlParaFecha(fecha) {
  return `${APP_URL}/?fecha=${fecha}`;
}
const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const DIAS_SEMANA = ['L','M','X','J','V','S','D'];

let state = null;        // { listas: { 'YYYY-MM-DD': { lugar, redes } } }
let loading = true;
let saving = false;

// vista actual: { screen: 'calendar', calYear, calMonth } o { screen: 'list', fecha }
let view = { screen: 'calendar', calYear: null, calMonth: null };
let showNewListModal = false;
let showNewRedModal = false;
let newRedData = { fecha: null, nombre: '', balon: '', lineas: '' };
let notifyMessage = null;

function uid() {
  return Math.random().toString(36).slice(2, 10);
}

function emptyState() {
  return { listas: {} };
}

function newRed(num) {
  return {
    id: uid(),
    numero: num,
    materiales: { balon: '', red: '', lineas: '' },
    jugadores: []
  };
}

function emptyLista() {
  return { lugar: '', espera: [], redes: [] };
}

function todayStr() {
  const d = new Date();
  return formatDateKey(d);
}

function formatDateKey(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function parseDateKey(key) {
  const [y, m, d] = key.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function formatFechaLarga(key) {
  const d = parseDateKey(key);
  const diasSemana = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  return `${diasSemana[d.getDay()]}, ${d.getDate()} de ${MESES[d.getMonth()]}`;
}

async function saveState(s) {
  saving = true;
  try {
    await DOC_REF.set({ data: JSON.stringify(s) });
  } catch (e) {
    console.error('Error guardando en Firestore', e);
  } finally {
    saving = false;
  }
}

function esc(str) {
  const div = document.createElement('div');
  div.textContent = str == null ? '' : String(str);
  return div.innerHTML;
}

function update(updater) {
  state = typeof updater === 'function' ? updater(state) : updater;
  saveState(state);
  render();
}

/* ---------- Aviso de WhatsApp ---------- */

function showNotify(mensaje) {
  notifyMessage = mensaje;
  render();
}

function closeNotify() {
  notifyMessage = null;
  render();
}

function copyAndOpenWhatsapp() {
  if (!notifyMessage) return;
  const texto = notifyMessage;
  const fallbackCopy = () => {
    const textarea = document.createElement('textarea');
    textarea.value = texto;
    textarea.style.position = 'fixed';
    textarea.style.opacity = '0';
    document.body.appendChild(textarea);
    textarea.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(textarea);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(texto).catch(fallbackCopy);
  } else {
    fallbackCopy();
  }
  window.open('https://wa.me/?text=' + encodeURIComponent(texto), '_blank');
  notifyMessage = null;
  render();
}

/* ---------- Navegacion ---------- */

function goToCalendar() {
  const today = new Date();
  view = { screen: 'calendar', calYear: today.getFullYear(), calMonth: today.getMonth() };
  render();
}

function openLista(fecha) {
  view = { screen: 'list', fecha };
  render();
}

function calPrevMonth() {
  let { calYear, calMonth } = view;
  calMonth -= 1;
  if (calMonth < 0) { calMonth = 11; calYear -= 1; }
  view = { ...view, calYear, calMonth };
  render();
}

function calNextMonth() {
  let { calYear, calMonth } = view;
  calMonth += 1;
  if (calMonth > 11) { calMonth = 0; calYear += 1; }
  view = { ...view, calYear, calMonth };
  render();
}

function openNewListModal() {
  showNewListModal = true;
  render();
}

function closeNewListModal() {
  showNewListModal = false;
  render();
}

function confirmNewList() {
  const input = document.getElementById('new-list-date');
  if (!input || !input.value) return;
  const fecha = input.value;
  const yaExistia = !!state.listas[fecha];
  update(prev => {
    if (prev.listas[fecha]) return prev; // ya existe, no pisar
    return { ...prev, listas: { ...prev.listas, [fecha]: emptyLista() } };
  });
  showNewListModal = false;
  openLista(fecha);
  if (!yaExistia) {
    showNotify(`📅 Nueva lista creada para el ${formatFechaLarga(fecha)}. ¡Apuntaos! ${urlParaFecha(fecha)}`);
  }
}

/* ---------- Acciones sobre una lista concreta ---------- */

function getLista(fecha) {
  return state.listas[fecha];
}

function updateLista(fecha, updater) {
  update(prev => {
    const actual = prev.listas[fecha] || emptyLista();
    const nueva = typeof updater === 'function' ? updater(actual) : updater;
    return { ...prev, listas: { ...prev.listas, [fecha]: nueva } };
  });
}

function openNewRedModal(fecha) {
  newRedData = { fecha, nombre: '', balon: '', lineas: '' };
  showNewRedModal = true;
  render();
}

function closeNewRedModal() {
  showNewRedModal = false;
  render();
}

function confirmNewRed() {
  const { fecha, nombre, balon, lineas } = newRedData;
  if (!nombre.trim() || !balon.trim() || !lineas.trim()) {
    alert('Debe rellenar el nombre del creador, balón y líneas');
    return;
  }

  let nuevoNumero = 0;
  updateLista(fecha, prev => {
    nuevoNumero = prev.redes.length + 1;
    const nuevaRed = newRed(nuevoNumero);
    nuevaRed.materiales.balon = balon;
    nuevaRed.materiales.lineas = lineas;

    const esperaOrdenada = [...(prev.espera || [])].sort((a, b) => (a.ts || 0) - (b.ts || 0));
    const aPromover = esperaOrdenada.slice(0, MAX_PER_RED - 1);
    const idsPromovidos = new Set(aPromover.map(p => p.id));

    nuevaRed.jugadores = aPromover;
    nuevaRed.jugadores.unshift({ id: uid(), nombre, hora: '—', ts: Date.now() });

    return {
      ...prev,
      espera: (prev.espera || []).filter(p => !idsPromovidos.has(p.id)),
      redes: [...prev.redes, nuevaRed]
    };
  });

  showNewRedModal = false;
  showNotify(`🏐 Nueva ${nuevoNumero}ª red abierta por ${nombre}. ¡Apuntaos aquí! ${urlParaFecha(fecha)}`);
}

function sendConvocatoria(fecha) {
  showNotify(`📣 Lista abierta ${formatFechaLarga(fecha)}. ¡Apúntate aquí! ${urlParaFecha(fecha)}`);
}
function deleteRed(fecha, id) {
  const lista = getLista(fecha);
  const red = lista.redes.find(r => r.id === id);
  const etiqueta = red ? `la ${red.numero}ª red` : 'esta red';
  if (!confirm(`¿Seguro que quieres borrar ${etiqueta}? Se perderán todos sus jugadores y lista de espera.`)) return;
  updateLista(fecha, prev => ({
    ...prev,
    redes: prev.redes.filter(r => r.id !== id).map((r, i) => ({ ...r, numero: i + 1 }))
  }));
  showNotify(`⚠️ Se ha borrado ${etiqueta} del ${formatFechaLarga(fecha)}.`);
}

function deleteLista(fecha) {
  if (!confirm(`¿Borrar toda la lista del ${formatFechaLarga(fecha)}? Se perderá todo lo apuntado.`)) return;
  update(prev => {
    const listas = { ...prev.listas };
    delete listas[fecha];
    return { ...prev, listas };
  });
  goToCalendar();
  showNotify(`🗑️ Se ha borrado la lista completa del ${formatFechaLarga(fecha)}.`);
}

function setLugar(fecha, val) {
  const lista = state.listas[fecha] || emptyLista();
  state = { ...state, listas: { ...state.listas, [fecha]: { ...lista, lugar: val } } };
  saveState(state);
}

function setMaterial(fecha, redId, tipo, nombre) {
  updateLista(fecha, prev => ({
    ...prev,
    redes: prev.redes.map(r => r.id === redId
      ? { ...r, materiales: { ...r.materiales, [tipo]: nombre } }
      : r)
  }));
}

function joinRed(fecha, redId, nombre, hora) {
  updateLista(fecha, prev => {
    const entry = { id: uid(), nombre, hora, ts: Date.now() };
    const red = prev.redes.find(r => r.id === redId);
    if (red && red.jugadores.length < MAX_PER_RED) {
      return {
        ...prev,
        redes: prev.redes.map(r => r.id === redId
          ? { ...r, jugadores: [...r.jugadores, entry] }
          : r)
      };
    }
    return { ...prev, espera: [...(prev.espera || []), entry] };
  });
}

function updateHora(fecha, redId, entryId, nuevaHora) {
  const hora = nuevaHora || '—';
  updateLista(fecha, prev => ({
    ...prev,
    redes: prev.redes.map(r => r.id !== redId ? r : {
      ...r,
      jugadores: r.jugadores.map(p => p.id === entryId ? { ...p, hora } : p)
    })
  }));
}

function updateHoraEspera(fecha, entryId, nuevaHora) {
  const hora = nuevaHora || '—';
  updateLista(fecha, prev => ({
    ...prev,
    espera: (prev.espera || []).map(p => p.id === entryId ? { ...p, hora } : p)
  }));
}

function removeFromRed(fecha, redId, entryId) {
  const lista = getLista(fecha);
  const red = lista.redes.find(r => r.id === redId);
  const persona = red?.jugadores.find(p => p.id === entryId);
  const nombre = persona ? persona.nombre : 'esta persona';
  if (!confirm(`¿Quitar a ${nombre} de la ${red?.numero}ª red?`)) return;

  let nombrePromovido = null;
  updateLista(fecha, prev => {
    const esperaOrdenada = [...(prev.espera || [])].sort((a, b) => (a.ts || 0) - (b.ts || 0));
    if (esperaOrdenada.length > 0) nombrePromovido = esperaOrdenada[0].nombre;
    return {
      ...prev,
      espera: esperaOrdenada.slice(1),
      redes: prev.redes.map(r => {
        if (r.id !== redId) return r;
        const jugadores = r.jugadores.filter(e => e.id !== entryId);
        if (esperaOrdenada.length > 0) jugadores.push(esperaOrdenada[0]);
        return { ...r, jugadores };
      })
    };
  });

  let mensaje = `❌ ${nombre} se ha quitado de la ${red?.numero}ª red del ${formatFechaLarga(fecha)}.`;
  if (nombrePromovido) {
    mensaje += ` ✅ ${nombrePromovido} subió automáticamente de la lista de espera.`;
  }
  showNotify(mensaje);
}

function removeFromEspera(fecha, entryId) {
  const lista = getLista(fecha);
  const persona = (lista.espera || []).find(p => p.id === entryId);
  const nombre = persona ? persona.nombre : 'esta persona';
  if (!confirm(`¿Quitar a ${nombre} de la lista de espera?`)) return;
  updateLista(fecha, prev => ({
    ...prev,
    espera: (prev.espera || []).filter(p => p.id !== entryId)
  }));
}

function getAllMembers(lista) {
  const set = new Set();
  const redes = (lista && Array.isArray(lista.redes)) ? lista.redes : [];
  redes.forEach(r => (r.jugadores || []).forEach(j => set.add(j.nombre)));
  (lista && lista.espera || []).forEach(j => set.add(j.nombre));
  return [...set].sort();
}

/* ---------- Render: chips, redes ---------- */

function renderMaterialChip(fecha, redId, icon, label, tipo, value, options) {
  const opts = ['<option value="">—</option>']
    .concat(options.map(name => `<option value="${esc(name)}" ${name === value ? 'selected' : ''}>${esc(name)}</option>`));
  if (value && !options.includes(value)) {
    opts.push(`<option value="${esc(value)}" selected>${esc(value)}</option>`);
  }
  return `
    <div class="material-chip">
      <span>${icon}</span>
      <span class="label">${label}:</span>
      <select onchange="setMaterial('${fecha}','${redId}','${tipo}', this.value)">
        ${opts.join('')}
      </select>
    </div>
  `;
}

function renderRed(fecha, red, allMembers) {
  const isClosed = red.jugadores.length >= MAX_PER_RED;
  const slotsLeft = MAX_PER_RED - red.jugadores.length;

  let playersHtml = '';
  for (let i = 0; i < MAX_PER_RED; i++) {
    const p = red.jugadores[i];
    if (p) {
      playersHtml += `
        <div class="player-row">
          <span class="player-slot-num">${i + 1}</span>
          <span class="player-name">${esc(p.nombre)}</span>
          <input type="time" lang="es" class="player-time-input" value="${esc(p.hora === '—' ? '' : p.hora)}" onchange="updateHora('${fecha}','${red.id}','${p.id}', this.value)" />
          <button class="player-remove" onclick="removeFromRed('${fecha}','${red.id}','${p.id}')" title="Quitar">✕</button>
        </div>`;
    } else {
      playersHtml += `<div class="empty-slot">${i + 1}. libre</div>`;
    }
  }

  const nameInputId = `name-${red.id}`;
  const timeInputId = `time-${red.id}`;
  const placeholder = isClosed ? 'Tu nombre (lista de espera)' : 'Tu nombre';
  const btnLabel = isClosed ? 'A la espera' : 'Apuntarme';

  return `
    <div class="red-card ${isClosed ? 'closed' : ''}">
      <div class="red-head">
        <div class="red-name-row">
          <span class="red-number">${red.numero}ª red</span>
          <span class="red-status ${isClosed ? 'closed-tag' : 'open'}">
            ${isClosed ? 'Cerrada' : `${slotsLeft} libre${slotsLeft !== 1 ? 's' : ''}`}
          </span>
        </div>
        <button class="delete-red" onclick="deleteRed('${fecha}','${red.id}')" title="Borrar red">✕</button>
      </div>

      <div class="materials-row">
        ${renderMaterialChip(fecha, red.id, '🏐', 'Balón', 'balon', red.materiales.balon, allMembers)}
        ${renderMaterialChip(fecha, red.id, '🥅', 'Red', 'red', red.materiales.red, allMembers)}
        ${renderMaterialChip(fecha, red.id, '〜', 'Líneas', 'lineas', red.materiales.lineas, allMembers)}
      </div>

      <div class="players-list">
        ${playersHtml}
      </div>

      <div class="join-form">
        <input type="text" id="${nameInputId}" placeholder="${placeholder}" maxlength="30" onkeydown="if(event.key==='Enter'){event.preventDefault(); handleJoinClick('${fecha}','${red.id}','${nameInputId}','${timeInputId}');}" />
        <input type="time" lang="es" id="${timeInputId}" />
        <button class="join-btn" type="button" onclick="handleJoinClick('${fecha}','${red.id}','${nameInputId}','${timeInputId}')">${btnLabel}</button>
      </div>
    </div>
  `;
}

function renderEsperaGlobal(fecha, lista) {
  const espera = (lista.espera || []).slice().sort((a, b) => (a.ts || 0) - (b.ts || 0));
  if (espera.length === 0) return '';
  return `
    <div class="waitlist-global">
      <div class="waitlist-title">⏳ Lista de espera general (${espera.length})</div>
      ${espera.map((p, i) => `
        <div class="waitlist-row">
          <span class="player-slot-num">${i + 1}</span>
          <span class="player-name">${esc(p.nombre)}</span>
          <input type="time" lang="es" class="player-time-input" value="${esc(p.hora === '—' ? '' : p.hora)}" onchange="updateHoraEspera('${fecha}','${p.id}', this.value)" />
          <button class="player-remove" onclick="removeFromEspera('${fecha}','${p.id}')" title="Quitar">✕</button>
        </div>
      `).join('')}
    </div>
  `;
}

function handleJoinClick(fecha, redId, nameInputId, timeInputId) {
  const nameInput = document.getElementById(nameInputId);
  const timeInput = document.getElementById(timeInputId);
  if (!nameInput) {
    console.error('No se encontro el input de nombre', nameInputId);
    return;
  }
  const nombre = nameInput.value.trim();
  if (!nombre) {
    nameInput.focus();
    return;
  }
  const hora = (timeInput && timeInput.value) || '—';
  joinRed(fecha, redId, nombre, hora);
}

/* ---------- Render: calendario ---------- */

function renderCalendar() {
  const { calYear, calMonth } = view;
  const today = todayStr();

  const firstOfMonth = new Date(calYear, calMonth, 1);
  let startWeekday = firstOfMonth.getDay(); // 0=domingo
  startWeekday = (startWeekday + 6) % 7; // convertir a 0=lunes

  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const daysInPrevMonth = new Date(calYear, calMonth, 0).getDate();

  const cells = [];
  for (let i = 0; i < startWeekday; i++) {
    const dayNum = daysInPrevMonth - startWeekday + i + 1;
    cells.push({ dayNum, inMonth: false, key: null });
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const key = formatDateKey(new Date(calYear, calMonth, d));
    cells.push({ dayNum: d, inMonth: true, key });
  }
  while (cells.length % 7 !== 0) {
    const idx = cells.length - (startWeekday + daysInMonth);
    cells.push({ dayNum: idx + 1, inMonth: false, key: null });
  }

  const daysHtml = cells.map(cell => {
    const hasList = cell.key && state.listas[cell.key];
    const isToday = cell.key === today;
    const classes = ['cal-day'];
    if (cell.inMonth) classes.push('in-month');
    if (hasList) classes.push('has-list');
    if (isToday) classes.push('is-today');
    const onclick = hasList ? `onclick="openLista('${cell.key}')"` : '';
    const dot = hasList ? '<span class="dot"></span>' : '';
    return `<div class="${classes.join(' ')}" ${onclick}>${cell.dayNum}${dot}</div>`;
  }).join('');

  const weekdaysHtml = DIAS_SEMANA.map(d => `<div class="cal-weekday">${d}</div>`).join('');

  return `
    <div class="main">
      <div class="cal-toolbar">
        <button class="cal-nav-btn" onclick="calPrevMonth()">‹</button>
        <span class="cal-month-label">${MESES[calMonth]} ${calYear}</span>
        <button class="cal-nav-btn" onclick="calNextMonth()">›</button>
      </div>
      <div class="calendar-grid">
        <div class="cal-weekdays">${weekdaysHtml}</div>
        <div class="cal-days">${daysHtml}</div>
      </div>
      <button class="add-list-btn" onclick="openNewListModal()">+ Nueva lista</button>
    </div>
  `;
}

function renderNewListModal() {
  if (!showNewListModal) return '';
  const today = todayStr();
  return `
    <div class="modal-overlay" onclick="if(event.target===this) closeNewListModal()">
      <div class="modal-box">
        <h3 class="modal-title">Nueva lista</h3>
        <input type="date" id="new-list-date" value="${today}" />
        <div class="modal-actions">
          <button class="modal-btn cancel" onclick="closeNewListModal()">Cancelar</button>
          <button class="modal-btn confirm" onclick="confirmNewList()">Crear</button>
        </div>
      </div>
    </div>
  `;
}

function renderNewRedModal() {
  if (!showNewRedModal) return '';
  return `
    <div class="modal-overlay" onclick="if(event.target===this) closeNewRedModal()">
      <div class="modal-box">
        <h3 class="modal-title">Nueva red</h3>
        <div style="margin-bottom: 12px;">
          <label style="font-size:12px; font-weight:600; color:var(--sea); display:block; margin-bottom:4px;">Nombre (quien la lleva)</label>
          <input type="text" id="red-nombre" placeholder="Tu nombre" maxlength="30" style="width:100%; border:1px solid var(--line); border-radius:10px; padding:9px 12px; font-family:'Sora',sans-serif; font-size:14px; outline:none; background:var(--sand);" />
        </div>
        <div style="margin-bottom: 12px;">
          <label style="font-size:12px; font-weight:600; color:var(--sea); display:block; margin-bottom:4px;">Balón</label>
          <input type="text" id="red-balon" placeholder="Marca o nombre" maxlength="30" style="width:100%; border:1px solid var(--line); border-radius:10px; padding:9px 12px; font-family:'Sora',sans-serif; font-size:14px; outline:none; background:var(--sand);" />
        </div>
        <div style="margin-bottom: 18px;">
          <label style="font-size:12px; font-weight:600; color:var(--sea); display:block; margin-bottom:4px;">Líneas</label>
          <input type="text" id="red-lineas" placeholder="Nombre o marca" maxlength="30" style="width:100%; border:1px solid var(--line); border-radius:10px; padding:9px 12px; font-family:'Sora',sans-serif; font-size:14px; outline:none; background:var(--sand);" />
        </div>
        <div class="modal-actions">
          <button class="modal-btn cancel" onclick="closeNewRedModal()">Cancelar</button>
          <button class="modal-btn confirm" onclick="newRedData.nombre = document.getElementById('red-nombre').value; newRedData.balon = document.getElementById('red-balon').value; newRedData.lineas = document.getElementById('red-lineas').value; confirmNewRed();">Crear red</button>
        </div>
      </div>
    </div>
  `;
}

/* ---------- Render: vista de lista de un dia ---------- */

function renderListView() {
  const fecha = view.fecha;
  const lista = getLista(fecha);

  if (!lista) {
    return `
      <div class="main">
        <button class="back-btn" onclick="goToCalendar()">‹ Calendario</button>
        <div class="empty-state">
          <div class="big">Esta lista ya no existe</div>
        </div>
      </div>
    `;
  }

  const allMembers = getAllMembers(lista);

  let redesHtml = '';
  if (lista.redes.length === 0) {
    redesHtml = `
      <div class="empty-state">
        <div class="big">Todavía no hay redes</div>
        <div>Crea la primera para empezar a apuntar gente</div>
      </div>`;
  } else {
    redesHtml = lista.redes.map(red => renderRed(fecha, red, allMembers)).join('');
  }

  return `
    <div class="header">
      <div class="header-inner">
        <button class="back-btn" onclick="goToCalendar()">‹ Calendario</button>
        <div class="eyebrow">Volea Beach Forever 🏝️</div>
        <div class="list-date-label">${formatFechaLarga(fecha)}</div>
        <div class="title-row">
          <h1 class="title">Lista del día</h1>
        </div>
        <div class="subtitle-row">
          <div class="field-pill">
            <span class="icon">📍</span>
            <input type="text" id="lugar-input" placeholder="Lugar (Ereaga, etc.)" value="${esc(lista.lugar)}" oninput="setLugar('${fecha}', this.value)" />
          </div>
        </div>
      </div>
    </div>

    <div class="main">
      <button class="add-red-btn" onclick="openNewRedModal('${fecha}')">+ Nueva red</button>
      <button class="add-red-btn" style="border-color: var(--coral); color: var(--coral); margin-top: 10px;" onclick="sendConvocatoria('${fecha}')">📣 Enviar convocatoria a WhatsApp</button>
      ${redesHtml}
      ${renderEsperaGlobal(fecha, lista)}
      <button class="back-btn" style="background:rgba(232,105,74,0.1); border-color:rgba(232,105,74,0.3); color:var(--coral); margin-top:8px;" onclick="deleteLista('${fecha}')">🗑 Borrar esta lista</button>
    </div>
  `;
}

/* ---------- Render principal ---------- */

function render() {
  const app = document.getElementById('app');
  if (loading) {
    app.innerHTML = '<div class="loading-screen">Cargando…</div>';
    return;
  }

  let body = '';
  if (view.screen === 'calendar') {
    body = `
      <div class="header">
        <div class="header-inner">
          <div class="eyebrow">Volea Beach Forever 🏝️</div>
          <div class="title-row">
            <h1 class="title">Calendario</h1>
          </div>
        </div>
      </div>
      ${renderCalendar()}
    `;
  } else if (view.screen === 'list') {
    body = renderListView();
  }

  app.innerHTML = body + renderNewListModal() + renderNewRedModal() + renderNotifyModal();
}

function renderNotifyModal() {
  if (!notifyMessage) return '';
  return `
    <div class="modal-overlay" onclick="if(event.target===this) closeNotify()">
      <div class="modal-box">
        <h3 class="modal-title">📣 Avisar al grupo</h3>
        <p style="font-size:14px; line-height:1.5; margin:0 0 18px; background:var(--sand); padding:12px 14px; border-radius:10px;">${esc(notifyMessage)}</p>
        <div class="modal-actions">
          <button class="modal-btn cancel" onclick="closeNotify()">No avisar</button>
          <button class="modal-btn confirm" onclick="copyAndOpenWhatsapp()">Copiar y abrir WhatsApp</button>
        </div>
      </div>
    </div>
  `;
}

function sanitizeLista(l) {
  const lugar = (l && typeof l.lugar === 'string') ? l.lugar : '';
  const redesRaw = (l && Array.isArray(l.redes)) ? l.redes : [];

  // Migración: recoger esperas antiguas por red y subirlas al nivel de lista
  const esperaHeredada = redesRaw.flatMap(r => Array.isArray(r.espera) ? r.espera : []);
  const esperaPropia = Array.isArray(l && l.espera) ? l.espera : [];
  const espera = [...esperaPropia, ...esperaHeredada].sort((a, b) => (a.ts || 0) - (b.ts || 0));

  const redes = redesRaw.map((r, i) => ({
    id: r.id || uid(),
    numero: r.numero || (i + 1),
    materiales: {
      balon: (r.materiales && r.materiales.balon) || '',
      red: (r.materiales && r.materiales.red) || '',
      lineas: (r.materiales && r.materiales.lineas) || ''
    },
    jugadores: Array.isArray(r.jugadores) ? r.jugadores : []
  }));
  return { lugar, espera, redes };
}

function sanitizeState(s) {
  if (!s || typeof s !== 'object' || !s.listas || typeof s.listas !== 'object') {
    return emptyState();
  }
  const listas = {};
  Object.keys(s.listas).forEach(fecha => {
    listas[fecha] = sanitizeLista(s.listas[fecha]);
  });
  return { listas };
}

function getFechaFromUrl() {
  try {
    const params = new URLSearchParams(window.location.search);
    const fecha = params.get('fecha');
    if (fecha && /^\d{4}-\d{2}-\d{2}$/.test(fecha)) return fecha;
  } catch (e) {
    // ignorar
  }
  return null;
}

function init() {
  loading = true;
  const today = new Date();
  view = { screen: 'calendar', calYear: today.getFullYear(), calMonth: today.getMonth() };
  render();

  DOC_REF.onSnapshot(
    (snap) => {
      if (saving) return;
      let remote = emptyState();
      if (snap.exists) {
        const data = snap.data();
        try {
          remote = sanitizeState(JSON.parse(data.data));
        } catch (e) {
          console.error('Error parseando datos de Firestore', e);
          remote = emptyState();
        }
      }

      const activeFocus = document.activeElement;
      const isTyping = activeFocus && activeFocus.tagName === 'INPUT';

      if (loading) {
        state = remote;
        loading = false;
        const fechaUrl = getFechaFromUrl();
        if (fechaUrl && state.listas[fechaUrl]) {
          view = { screen: 'list', fecha: fechaUrl };
        }
        render();
        return;
      }

      if (isTyping) return;
      if (JSON.stringify(state) === JSON.stringify(remote)) return;
      state = remote;
      render();
    },
    (err) => {
      console.error('Error escuchando Firestore', err);
      if (loading) {
        state = emptyState();
        loading = false;
        render();
      }
    }
  );
}

init();
</script>
